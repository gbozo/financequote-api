<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceQuote API - Swagger</title>
    <link rel="stylesheet" type="text/css" href="/swagger/swagger-ui.css">
    <style>
        body { margin: 0; padding: 0; }
        .topbar { display: none; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="/swagger/swagger-ui-bundle.js" charset="UTF-8"></script>
    <script src="/swagger/swagger-ui-standalone-preset.js" charset="UTF-8"></script>
    <script>
        window.addEventListener('load', function() {
            const SwaggerUIBundle = window.SwaggerUIBundle;
            const SwaggerUIStandalonePreset = window.SwaggerUIStandalonePreset;

            SwaggerUIBundle({
                dom_id: '#swagger-ui',
                url: '/openapi.yaml',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                layout: 'StandaloneLayout',
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ]
            });
        });
    </script>
</body>
</html>

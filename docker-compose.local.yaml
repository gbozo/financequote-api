# Production-ready Docker Compose for FinanceQuote API
# Usage: docker compose -f docker-compose.yaml up -d
#
# Default port: 3001 (mapped to container port 3000)
# API URL: http://localhost:3001/api/v1
# Docs: http://localhost:3001

services:
  financequote-api:
    # Build from local Dockerfile
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: financequote-api:local
    container_name: financequote-api
    environment:
      - APP_ENV=production
      - APP_PORT=3001
      - FQ_TIMEOUT=30
      - FQ_FAILOVER=1
      # Target currency for quotes (optional)
      - FQ_CURRENCY=EUR
      # API Authentication (optional - leave empty to disable)
      # Set comma-separated keys: API_AUTH_KEYS=key1,key2
      # - API_AUTH_KEYS=
      
      # Stock Quote API Keys (optional - only if using premium sources)
      # Alphavantage supports both quotes AND currency conversion
      # - ALPHAVANTAGE_API_KEY=
      # - TWELVEDATA_API_KEY=
      # - FINANCEAPI_API_KEY=
      # - STOCKDATA_API_KEY=
      
      # Currency API Keys (optional)
      # - FIXER_API_KEY=
      # - OPENEXCHANGE_API_KEY=
      # - CURRENCYFREAKS_API_KEY=

      # Cache settings (optional)
      # - FQ_CACHE_TTL=900       # Cache TTL in seconds (default: 900 = 15 min)
      # - FQ_CACHE_ENABLED=1    # Enable/disable cache (default: 1 = enabled)
    ports:
      - "3001:3000"
    # tmpfs for SQLite database (recommended for performance with large datasets)
    tmpfs:
      - /tmp:size=512m,mode=1777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - financequote-net

networks:
  financequote-net:
    driver: bridge